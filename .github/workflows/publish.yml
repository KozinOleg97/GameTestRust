name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/create-gh-release-action@v1
        with:
          # # (optional) Path to changelog.
          # changelog: CHANGELOG.md
          # # (required) GitHub token for creating GitHub Releases.
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    env:
      ENABLE_RUNTIME_TESTS: false
      PKG_CONFIG_SYSROOT_DIR: /
    steps:
      - uses: actions/checkout@v5
      - name: Install cross-compilation tools
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
        if: startsWith(matrix.os, 'ubuntu')
      # - name: Install musl-tools on Linux
      #   run: sudo apt-get update --yes && sudo apt-get install --yes musl-tools
      #   if: contains(matrix.target, 'musl')
      - name: Install tools
        run: sudo apt-get update --yes && sudo apt-get install --yes libxi-dev libx11-dev libxcb1 libxrandr2 libdbus-1-3 libxtst-dev libdbus-1-dev librust-x11-dev libpipewire-0.3-dev libwayland-dev libegl-dev libxkbcommon-dev libgbm-dev libasound2-dev libudev-dev
        if: contains(matrix.os, 'ubuntu')
      - name: Copy assets to binary directory
        shell: bash
        run: |
          mkdir -p target/${{ matrix.target }}/release/assets
          cp -r assets/* target/${{ matrix.target }}/release/assets/
        if: matrix.os == 'ubuntu-latest'
      - name: Copy assets to binary directory (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "target/${{ matrix.target }}/release/assets"
          Copy-Item -Recurse -Path "assets/*" -Destination "target/${{ matrix.target }}/release/assets/"
        if: matrix.os == 'windows-latest'
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          # (required) Comma-separated list of binary names (non-extension portion of filename) to build and upload.
          # Note that glob pattern is not supported yet.
          bin: GameTestRust
          # (optional) Target triple, default is host triple.
          target: ${{ matrix.target }}
          # (required) GitHub token for uploading assets to GitHub Releases.
          token: ${{ secrets.GITHUB_TOKEN }}
          # Include assets in archive
          archive: true
          include: assets