name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+         # только стабильные релизы (v1.2.3)
      - v[0-9]+.[0-9]+.[0-9]+-*       # prerelease (v1.2.3-alpha.1)
  workflow_dispatch:

jobs:
  # Создание релиза на GitHub с автоматическим описанием
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Generate changelog and create release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  # Сборка и загрузка ассетов для каждой платформы
  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always   # Цветной вывод в логах

    steps:
      - uses: actions/checkout@v5

      # Проверка соответствия версии в Cargo.toml и тега
      - name: Verify version matches tag
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version =' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          TAG_VERSION=${GITHUB_REF_NAME#v}
          # Убираем суффикс prerelease для сравнения
          TAG_VERSION=${TAG_VERSION%%-*}
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Cargo.toml version $VERSION != tag version $TAG_VERSION"
            exit 1
          fi

      # Кэш зависимостей Rust
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          save-if: ${{ github.ref_type == 'tag' }}

      # Установка кросс-компиляции для Linux
      - name: Install cross-compilation tools
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
        if: startsWith(matrix.os, 'ubuntu')

      # Системные зависимости Bevy (Linux)
      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxi-dev libx11-dev libxcb1 libxrandr2 \
            libdbus-1-3 libxtst-dev libdbus-1-dev librust-x11-dev libpipewire-0.3-dev \
            libwayland-dev libegl-dev libxkbcommon-dev libgbm-dev libasound2-dev libudev-dev
        if: matrix.os == 'ubuntu-latest'

      # Тесты
      - name: Run tests
        run: cargo test --target ${{ matrix.target }}

      # Сборка бинарника в релизной конфигурации
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      # Копирование ассетов
      - name: Copy assets
        shell: bash
        run: |
          mkdir -p target/${{ matrix.target }}/release/assets
          if [ -d assets ]; then
            cp -r assets/. target/${{ matrix.target }}/release/assets/
          fi

      # Проверка, что бинарник действительно собран
      - name: Verify binary exists
        shell: bash
        run: |
          if [ ! -f "target/${{ matrix.target }}/release/GameTestRust" ] && [ ! -f "target/${{ matrix.target }}/release/GameTestRust.exe" ]; then
            echo "Binary not found!"
            exit 1
          fi

      # Создание архива (tar.gz / zip) и загрузка в релиз
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: GameTestRust
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
          archive: GameTestRust-${{ matrix.target }}-${{ github.ref_name }}
          include: assets