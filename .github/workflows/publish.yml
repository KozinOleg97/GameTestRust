name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*       # Запуск при пуше тега вида v1.0.0 и т.п.
  workflow_dispatch:   # Возможность ручного запуска

jobs:
  # Создание релиза на GitHub
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Сборка и загрузка ассетов для каждой платформы
  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always   # Цветной вывод в логах

    steps:
      - uses: actions/checkout@v5

      # Ускорение кэширования зависимостей Rust (registry и build-артефакты)
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          save-if: ${{ github.ref_type == 'tag' }}

      # Установка инструментов кросс-компиляции для Linux
      - name: Install cross-compilation tools
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
        if: startsWith(matrix.os, 'ubuntu')

      # Системные зависимости для Bevy (Linux)
      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxi-dev libx11-dev libxcb1 libxrandr2 \
            libdbus-1-3 libxtst-dev libdbus-1-dev librust-x11-dev libpipewire-0.3-dev \
            libwayland-dev libegl-dev libxkbcommon-dev libgbm-dev libasound2-dev libudev-dev
        if: matrix.os == 'ubuntu-latest'

      # Запуск тестов (проверка работоспособности)
      - name: Run tests
        run: cargo test --target ${{ matrix.target }}

      # Сборка бинарника в релизной конфигурации
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      # Копирование ассетов (например, текстур, шейдеров) в директорию с бинарником
      - name: Copy assets
        shell: bash
        run: |
          mkdir -p target/${{ matrix.target }}/release/assets
          if [ -d assets ]; then
            cp -r assets/. target/${{ matrix.target }}/release/assets/
          fi

      # Проверка, что бинарник действительно собран
      - name: Verify binary exists
        shell: bash
        run: |
          if [ ! -f "target/${{ matrix.target }}/release/GameTestRust" ] && [ ! -f "target/${{ matrix.target }}/release/GameTestRust.exe" ]; then
            echo "Binary not found!"
            exit 1
          fi

      # Создание архива (tar.gz / zip) и загрузка в релиз
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: GameTestRust
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
          archive: GameTestRust-${{ matrix.target }}-${{ github.ref_name }}
          include: assets